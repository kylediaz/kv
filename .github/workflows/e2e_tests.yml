name: "E2E Tests"
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
jobs:
  build:
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@v4"

      - name: "Install Nix"
        uses: "cachix/install-nix-action@v31"

      - name: "Configure Devenv Cache"
        uses: "cachix/cachix-action@v16"
        with:
          name: devenv

      - name: "Install Devenv"
        run: nix profile add nixpkgs#devenv

      - name: Build
        run: cargo build

      - name: Spawn server
        run: cargo run &

      - name: "Run E2E Tests"
        run: devenv shell pytest test/e2e/*
